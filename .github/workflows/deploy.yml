name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Use npm 11.13.0
        run: npm install --global npm@11.13.0
      - name: Verify runtime
        run: |
          test "$(node --version)" = "v24.16.0"
          test "$(npm --version)" = "11.13.0"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Test public routes
        run: npm run e2e:ci
      - name: Upload Playwright artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-artifacts
          path: output/playwright/
          if-no-files-found: ignore
          retention-days: 14

  robinhood-fork:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Use npm 11.13.0
        run: npm install --global npm@11.13.0
      - name: Install dependencies
        run: npm ci
      - name: Test Robinhood fork
        env:
          ROBINHOOD_RPC_URL: ${{ secrets.ROBINHOOD_RPC_URL }}
        run: |
          if [ -z "$ROBINHOOD_RPC_URL" ]; then
            echo "ROBINHOOD_RPC_URL must be configured for trusted main pushes."
            exit 1
          fi
          npm run test:robinhood

  production:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [quality, robinhood-fork]
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Install Vercel CLI
        run: npm install --global vercel@56.3.1
      - name: Deploy
        run: vercel deploy --yes --prod --token="${{ secrets.VERCEL_TOKEN }}"
